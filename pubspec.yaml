name: blog_agent
description: AI-powered blog generation agent using Gemini, Tavily, Firebase, and WordPress publishing.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3

  # Gemini AI

  # HTTP Client
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Environment Variables
  flutter_dotenv: ^5.2.1

  # Markdown rendering
  flutter_markdown: ^0.7.3

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
